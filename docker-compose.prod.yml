services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PORT=8000
    expose:
      - '8000'
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
