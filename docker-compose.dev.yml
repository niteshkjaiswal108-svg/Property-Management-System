services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - PORT=8000
      - CI=true
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

    expose:
      - '8000'

  nginx:
    image: nginx:latest
    ports:
      - '8000:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  app_node_modules:
